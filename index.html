<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topaz is Working</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000010;
    font-family: 'Exo 2', sans-serif;
    overflow: hidden;
    perspective: 1000px;
  }

  /* Starfield canvas */
  canvas#starfield {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* Nebula glow */
  .nebula {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      radial-gradient(ellipse at 25% 30%, rgba(90, 0, 200, 0.15) 0%, transparent 55%),
      radial-gradient(ellipse at 75% 60%, rgba(0, 150, 255, 0.10) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(0, 255, 200, 0.06) 0%, transparent 45%);
    animation: nebulaShift 12s ease-in-out infinite alternate;
  }

  @keyframes nebulaShift {
    0%   { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(30deg); }
  }

  /* 3D Scene */
  .scene {
    position: relative;
    z-index: 10;
    transform-style: preserve-3d;
    animation: sceneOrbit 8s ease-in-out infinite;
  }

  @keyframes sceneOrbit {
    0%, 100% { transform: rotateX(4deg) rotateY(-4deg) translateY(0); }
    25%      { transform: rotateX(-2deg) rotateY(2deg) translateY(-12px); }
    50%      { transform: rotateX(2deg) rotateY(4deg) translateY(-6px); }
    75%      { transform: rotateX(-3deg) rotateY(-2deg) translateY(-15px); }
  }

  /* Glassmorphism Card */
  .card {
    position: relative;
    padding: 50px 60px;
    border-radius: 28px;
    transform-style: preserve-3d;
    background: linear-gradient(160deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
    backdrop-filter: blur(24px);
    border: 1px solid rgba(100, 180, 255, 0.12);
    box-shadow:
      0 0 80px rgba(80, 120, 255, 0.06),
      0 40px 80px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.08);
    max-width: 560px;
    width: 90vw;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 30px;
    background: conic-gradient(
      from 0deg,
      rgba(0, 200, 255, 0.3),
      rgba(120, 0, 255, 0.2),
      transparent 30%,
      transparent 70%,
      rgba(0, 255, 180, 0.2),
      rgba(0, 200, 255, 0.3)
    );
    z-index: -1;
    animation: borderRotate 6s linear infinite;
  }

  @keyframes borderRotate {
    to { filter: hue-rotate(360deg); }
  }

  /* Planet / Hologram 3D sphere */
  .planet-container {
    text-align: center;
    margin-bottom: 24px;
    transform: translateZ(80px);
  }

  .planet {
    width: 110px;
    height: 110px;
    margin: 0 auto;
    border-radius: 50%;
    position: relative;
    background:
      radial-gradient(circle at 35% 35%, rgba(100, 200, 255, 0.9), rgba(20, 60, 150, 0.8) 50%, rgba(5, 10, 40, 1));
    box-shadow:
      0 0 40px rgba(80, 160, 255, 0.4),
      0 0 80px rgba(80, 160, 255, 0.15),
      inset -15px -10px 30px rgba(0,0,0,0.6);
    animation: planetSpin 10s linear infinite;
  }

  /* Ring around planet */
  .planet::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 170px;
    height: 40px;
    border: 2px solid rgba(150, 200, 255, 0.25);
    border-radius: 50%;
    transform: translate(-50%, -50%) rotateX(72deg);
    box-shadow: 0 0 12px rgba(100, 180, 255, 0.2);
  }

  /* Surface texture lines */
  .planet::before {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    background: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 12px,
      rgba(255,255,255,0.04) 12px,
      rgba(255,255,255,0.04) 14px
    );
    animation: surfaceScroll 8s linear infinite;
    mask-image: radial-gradient(circle, white 55%, transparent 65%);
    -webkit-mask-image: radial-gradient(circle, white 55%, transparent 65%);
  }

  @keyframes surfaceScroll {
    to { background-position: 100px 0; }
  }

  @keyframes planetSpin {
    to { filter: hue-rotate(20deg); }
  }

  /* Orbiting moons */
  .orbit {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 160px;
    height: 160px;
    margin-top: -80px;
    margin-left: -80px;
    animation: orbitSpin 4s linear infinite;
    pointer-events: none;
  }

  .moon {
    position: absolute;
    width: 10px;
    height: 10px;
    background: radial-gradient(circle at 30% 30%, #fff, #88ccff);
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(100, 200, 255, 0.6);
    top: 0;
    left: 50%;
    transform: translateX(-50%);
  }

  @keyframes orbitSpin {
    to { transform: rotate(360deg); }
  }

  .orbit-2 {
    width: 200px;
    height: 200px;
    margin-top: -100px;
    margin-left: -100px;
    animation-duration: 6s;
    animation-direction: reverse;
  }

  .orbit-2 .moon {
    width: 6px;
    height: 6px;
    background: radial-gradient(circle at 30% 30%, #fff, #cc88ff);
    box-shadow: 0 0 8px rgba(180, 100, 255, 0.5);
  }

  /* Title */
  .title {
    text-align: center;
    margin-bottom: 10px;
    transform: translateZ(50px);
  }

  .title h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.2rem;
    font-weight: 900;
    background: linear-gradient(135deg, #00d4ff, #7b2fff, #00ffc8, #00d4ff);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: textShimmer 4s ease-in-out infinite;
    line-height: 1.3;
    letter-spacing: 2px;
  }

  @keyframes textShimmer {
    0%, 100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }

  /* Subtitle */
  .subtitle {
    text-align: center;
    transform: translateZ(35px);
    margin-bottom: 28px;
  }

  .subtitle p {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: rgba(0, 210, 255, 0.8);
    letter-spacing: 6px;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(0, 180, 255, 0.4), 0 0 60px rgba(0, 180, 255, 0.1);
    animation: subtitlePulse 3s ease-in-out infinite;
  }

  @keyframes subtitlePulse {
    0%, 100% { opacity: 0.8; letter-spacing: 6px; }
    50%      { opacity: 1; letter-spacing: 8px; }
  }

  /* Holographic scan line */
  .scanline {
    position: absolute;
    left: 20px;
    right: 20px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0, 220, 255, 0.3), transparent);
    animation: scan 4s ease-in-out infinite;
    z-index: 20;
    pointer-events: none;
  }

  @keyframes scan {
    0%, 100% { top: 10%; opacity: 0; }
    10%      { opacity: 1; }
    90%      { opacity: 1; }
    50%      { top: 90%; }
  }

  /* Data stream bar */
  .data-stream {
    margin-top: 24px;
    transform: translateZ(25px);
  }

  .stream-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.7rem;
    color: rgba(0, 200, 255, 0.4);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-family: 'Orbitron', sans-serif;
    margin-bottom: 8px;
  }

  .stream-bar {
    height: 3px;
    background: rgba(255,255,255,0.04);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  .stream-fill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #00d4ff, #7b2fff, #00ffc8);
    background-size: 200% 100%;
    border-radius: 4px;
    animation: streamFlow 2s linear infinite;
    box-shadow: 0 0 12px rgba(0, 200, 255, 0.4);
  }

  @keyframes streamFlow {
    to { background-position: -200% 0; }
  }

  /* Wait text */
  .wait-text {
    text-align: center;
    transform: translateZ(20px);
    margin-top: 22px;
  }

  .wait-text p {
    font-size: 0.95rem;
    color: rgba(180, 210, 255, 0.45);
    letter-spacing: 2px;
    font-weight: 300;
  }

  .dots {
    display: inline-flex;
    gap: 5px;
    margin-left: 6px;
    vertical-align: middle;
  }

  .dot {
    width: 5px;
    height: 5px;
    background: rgba(0, 200, 255, 0.6);
    border-radius: 50%;
    animation: dotPulse 1.6s ease-in-out infinite;
    box-shadow: 0 0 6px rgba(0, 200, 255, 0.4);
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotPulse {
    0%, 80%, 100% { transform: scale(0.5); opacity: 0.3; }
    40%           { transform: scale(1.3); opacity: 1; }
  }

  /* Corner decorations */
  .corner {
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: rgba(0, 200, 255, 0.25);
    border-style: solid;
    border-width: 0;
  }

  .corner-tl { top: 12px; left: 12px; border-top-width: 2px; border-left-width: 2px; border-radius: 4px 0 0 0; }
  .corner-tr { top: 12px; right: 12px; border-top-width: 2px; border-right-width: 2px; border-radius: 0 4px 0 0; }
  .corner-bl { bottom: 12px; left: 12px; border-bottom-width: 2px; border-left-width: 2px; border-radius: 0 0 0 4px; }
  .corner-br { bottom: 12px; right: 12px; border-bottom-width: 2px; border-right-width: 2px; border-radius: 0 0 4px 0; }

  /* Status indicators */
  .status-row {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-top: 18px;
    transform: translateZ(15px);
  }

  .status-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.65rem;
    color: rgba(150, 200, 255, 0.35);
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 8px rgba(0, 255, 136, 0.5);
    animation: blink 2s ease-in-out infinite;
  }

  .status-dot.amber {
    background: #ffaa00;
    box-shadow: 0 0 8px rgba(255, 170, 0, 0.5);
    animation-delay: 0.5s;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }

  /* Floor reflection */
  .floor-glow {
    position: absolute;
    bottom: -70px;
    left: 50%;
    transform: translateX(-50%);
    width: 70%;
    height: 50px;
    background: radial-gradient(ellipse, rgba(0, 160, 255, 0.1), transparent 70%);
    filter: blur(15px);
    animation: glowPulse 8s ease-in-out infinite;
  }

  @keyframes glowPulse {
    0%, 100% { opacity: 0.5; }
    50%      { opacity: 1; }
  }
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<div class="nebula"></div>

<div class="scene">
  <div class="card">
    <div class="scanline"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="planet-container">
      <div style="position:relative; display:inline-block;">
        <div class="planet"></div>
        <div class="orbit">
          <div class="moon"></div>
        </div>
        <div class="orbit orbit-2">
          <div class="moon"></div>
        </div>
      </div>
    </div>

    <div class="title">
      <h1>TOPAZ IS WORKING</h1>
    </div>

    <div class="subtitle">
      <p>Let Him Cook</p>
    </div>

    <div class="data-stream">
      <div class="stream-label">
        <span>Processing</span>
        <span>In Progress</span>
      </div>
      <div class="stream-bar">
        <div class="stream-fill"></div>
      </div>
    </div>

    <div class="status-row">
      <div class="status-item">
        <div class="status-dot"></div>
        <span>Systems Online</span>
      </div>
      <div class="status-item">
        <div class="status-dot amber"></div>
        <span>Computing</span>
      </div>
    </div>

    <div class="wait-text">
      <p>Wait for minutes
        <span class="dots">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </span>
      </p>
    </div>

    <div class="floor-glow"></div>
  </div>
</div>

<script>
  // === STARFIELD ===
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const stars = [];
  for (let i = 0; i < 600; i++) {
    stars.push({
      x: Math.random() * 2000 - 1000,
      y: Math.random() * 2000 - 1000,
      z: Math.random() * 1000,
      o: Math.random()
    });
  }

  function drawStars() {
    ctx.fillStyle = 'rgba(0, 0, 16, 0.25)';
    ctx.fillRect(0, 0, W, H);

    for (const s of stars) {
      s.z -= 0.4;
      if (s.z <= 0) {
        s.x = Math.random() * 2000 - 1000;
        s.y = Math.random() * 2000 - 1000;
        s.z = 1000;
        s.o = Math.random();
      }

      const sx = (s.x / s.z) * 300 + W / 2;
      const sy = (s.y / s.z) * 300 + H / 2;
      const r = Math.max(0, (1 - s.z / 1000) * 2.2);
      const a = (1 - s.z / 1000) * s.o;

      if (sx < 0 || sx > W || sy < 0 || sy > H) continue;

      ctx.beginPath();
      ctx.arc(sx, sy, r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200, 220, 255, ${a})`;
      ctx.fill();

      // Star trail
      if (r > 0.8) {
        const tx = ((s.x / (s.z + 8)) * 300) + W / 2;
        const ty = ((s.y / (s.z + 8)) * 300) + H / 2;
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(tx, ty);
        ctx.strokeStyle = `rgba(180, 210, 255, ${a * 0.3})`;
        ctx.lineWidth = r * 0.5;
        ctx.stroke();
      }
    }

    requestAnimationFrame(drawStars);
  }
  drawStars();

  // === INTERACTIVE 3D TILT ===
  const scene = document.querySelector('.scene');
  document.addEventListener('mousemove', (e) => {
    const x = (e.clientX / W - 0.5) * 24;
    const y = (e.clientY / H - 0.5) * 24;
    scene.style.transform = `rotateX(${-y}deg) rotateY(${x}deg)`;
  });

  document.addEventListener('mouseleave', () => {
    scene.style.transform = '';
  });
</script>

</body>
</html>
